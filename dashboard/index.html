<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Carré — CRM IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Marked.js pour le rendu du Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- HEADER / KPIs -->
        <header class="top-bar glass">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="2" fill="#0E1E3A"/>
                    <path d="M12 6L18 18H6L12 6Z" fill="#FAFAF7"/>
                </svg>
                <h1>Dossier Carré</h1>
            </div>
            <div class="kpi-container">
                <div class="kpi">
                    <span class="kpi-label">Total Leads</span>
                    <span class="kpi-value" id="kpi-total">-</span>
                </div>
                <div class="kpi">
                    <span class="kpi-label">Avec Email</span>
                    <span class="kpi-value" id="kpi-emails">-</span>
                </div>
                <div class="kpi">
                    <span class="kpi-label">À optimiser</span>
                    <span class="kpi-value" id="kpi-todo">-</span>
                </div>
            </div>
            <div class="actions" style="display: flex; gap: 12px; align-items: center;">
                <div id="pipeline-status-container" class="pipeline-status-container" style="display: none; font-size: 13px; color: var(--text-dim); align-items: center; gap: 8px;">
                    <span class="pulse-dot"></span>
                    <span id="pipeline-status-text">Initialisation...</span>
                </div>
                <button class="btn-primary-action" id="btn-run-pipeline" style="display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--primary); color: var(--bg); border: none; border-radius: 4px; font-family: var(--font-sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Enrichir les leads (Batch de 5)
                </button>
                <button class="btn-icon" id="btn-refresh" title="Rafraîchir les données">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                </button>
            </div>
        </header>

        <!-- MAIN TABLE -->
        <main class="content">
            <div class="table-card glass">
                <div class="table-header">
                    <h2>Prospection BTP</h2>
                    <input type="text" id="search-input" placeholder="Rechercher (Nom, NAF, BOAMP)..." class="search-bar">
                </div>
                <div class="table-wrapper">
                    <table id="leads-table">
                        <thead>
                            <tr>
                                <th>Statut</th>
                                <th>SIREN</th>
                                <th>Nom</th>
                                <th>NAF</th>
                                <th>Activité BOAMP</th>
                            </tr>
                        </thead>
                        <tbody id="leads-tbody">
                            <!-- Rempli par JS -->
                        </tbody>
                    </table>
                </div>
                <div id="loader" class="loader">Chargement depuis Google Sheets...</div>
            </div>
        </main>
    </div>

    <!-- SIDE PANEL (Offcanvas) -->
    <div class="side-panel" id="side-panel">
        <div class="panel-header glass">
            <h2 id="panel-nom">Nom de l'entreprise</h2>
            <button class="btn-close" id="btn-close-panel">&times;</button>
        </div>
        <div class="panel-content">
            <div class="info-group">
                <label>Dirigeant</label>
                <p id="panel-dirigeant">-</p>
            </div>
            <div class="info-group">
                <label>Site Web</label>
                <p id="panel-site">-</p>
            </div>
            <div class="info-group">
                <label>Analyse Gemini (Friction)</label>
                <div class="markdown-body" id="panel-analyse"></div>
            </div>
            <div class="info-group">
                <label>Brouillon Cold Email</label>
                <div class="markdown-body email-box" id="panel-draft"></div>
            </div>
        </div>
        <div class="panel-footer glass">
            <a href="#" id="btn-mailto" class="btn-primary" target="_blank">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                Ouvrir dans Mail
            </a>
        </div>
    </div>
    <div class="panel-overlay" id="panel-overlay"></div>

    <script src="app.js"></script>
</body>
</html>
